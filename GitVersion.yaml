increment: Patch
commit-message-incrementing: Enabled  
next-version: V1.0.0

tag-prefix: '[vV]'

major-version-bump-message: "^(feat|fix|docs|style|refactor|perf|test)(\\([\\w\\s-]*\\))?(!:|:.*\\n\\n((.+\\n)+\\n)?BREAKING CHANGE:\\s.+)"
minor-version-bump-message: "^(feat)(\\([\\w\\s-]*\\))?:"
patch-version-bump-message: "^(fix)(\\([\\w\\s-]*\\))?:"
no-bump-message: "\\+semver:\\s?(none|skip)"

branches:
  main:
    regex: ^main$
    increment: Patch
    label: ''

  pull-request:
    increment: Inherit
    label: alpha