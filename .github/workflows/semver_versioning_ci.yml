name: Semver Versioning CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  computing_version:
    name: Compute Semver Version
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
              
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.3.3
        with:
          versionSpec: '6.6.x'

      - name: Execute GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.3.3

      - name: Output GitVersion variables
        run: |
          echo "GitVersion variables:"
          echo "  SemVer: ${{ steps.gitversion.outputs.semVer }}"

      - name: Configure Git
        if: ${{ steps.gitversion.outputs.semVer != '' && github.ref == 'refs/heads/main' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Tag
        if: ${{ steps.gitversion.outputs.semVer != '' && github.ref == 'refs/heads/main' }}
        id: create_tag
        run: |
          exists=false
          tag_name="V${{ steps.gitversion.outputs.semVer }}"

          if git rev-parse "refs/tags/${tag_name}" >/dev/null 2>&1; then
            echo "Tag ${tag_name} already exists."
            exists=true
          else
            git tag -a "${tag_name}" -m "Release V${{ steps.gitversion.outputs.semVer }}"
            git push origin "${tag_name}" || { echo "Failed to push tag"; exit 1; }
          fi
          echo "exists=${exists}" >> $GITHUB_OUTPUT
          echo "tag_name=${tag_name}" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        if: ${{ steps.gitversion.outputs.semVer != '' && steps.create_tag.outputs.exists == 'false' && steps.create_tag.outputs.tag_name != '' && steps.create_tag.outcome == 'success' && github.ref == 'refs/heads/main' }}
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.create_tag.outputs.tag_name }}
          release_name: ${{ steps.create_tag.outputs.tag_name }}
          draft: false
          generate_release_notes: true
          prerelease: ${{ contains(steps.gitversion.outputs.semVer, '-alpha') || contains(steps.gitversion.outputs.semVer, '-beta') || contains(steps.gitversion.outputs.semVer, '-rc') || contains(steps.gitversion.outputs.semVer, '-pre') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
